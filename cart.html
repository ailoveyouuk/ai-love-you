<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Love You — Your Bag</title>
    <link href="index.css" rel="stylesheet">
    <style>
        .cart-container {
            padding: var(--spacing-xl) 20px;
            max-width: none;
            margin: 0;
            min-height: 80vh;
            background: #ffffff;
        }

        .cart-header {
            margin-bottom: var(--spacing-lg);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: var(--spacing-sm);
        }

        .cart-title {
            font-size: clamp(2rem, 5vw, 4rem);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -0.02em;
        }

        .cart-items {
            display: flex;
            flex-direction: column;
            gap: 0;
            border-bottom: 1px solid var(--border-color);
        }

        .cart-item {
            display: grid;
            grid-template-columns: 150px 1fr auto;
            gap: var(--spacing-md);
            padding: var(--spacing-md) 0;
            border-top: 1px solid var(--border-color);
            align-items: center;
        }

        .cart-item-image {
            width: 150px;
            aspect-ratio: 1.414;
            object-fit: cover;
            background: #ffffff;
            border: 1px solid var(--border-color);
        }

        .cart-item-details {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .cart-item-title {
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 800;
            text-transform: uppercase;
            margin: 0;
        }

        .cart-item-variant {
            color: var(--ink-gray);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .remove-btn {
            background: none;
            border: none;
            color: var(--ink-gray);
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            text-decoration: underline;
            padding: 0;
            margin-top: 8px;
            width: fit-content;
        }

        .remove-btn:hover {
            color: var(--accent-color);
        }

        .cart-item-price-col {
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: var(--spacing-sm);
        }

        .qty-controls {
            display: flex;
            align-items: center;
            border: 1px solid var(--border-color);
            border-radius: 50px;
            padding: 4px 8px;
        }

        .qty-btn {
            background: transparent;
            border: none;
            width: 24px;
            height: 24px;
            cursor: pointer;
            color: var(--text-color);
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .qty-display {
            font-family: var(--font-display);
            font-size: 0.85rem;
            font-weight: 700;
            min-width: 24px;
            text-align: center;
        }

        .item-total {
            font-family: var(--font-body);
            font-size: 1.1rem;
            font-weight: 800;
        }

        .cart-summary {
            margin-top: var(--spacing-xl);
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: var(--spacing-sm);
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            width: 400px;
            font-family: var(--font-display);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--ink-gray);
        }

        .summary-total {
            border-top: 1px solid var(--border-color);
            padding-top: var(--spacing-md);
            margin-top: var(--spacing-sm);
            font-size: 3rem;
            font-weight: 800;
            color: var(--text-color);
            letter-spacing: -0.03em;
        }

        .btn-checkout {
            margin-top: var(--spacing-md);
            padding: 1.2rem 4rem;
            background: var(--accent-color);
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 800;
            border: 1.5px solid var(--accent-color);
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 400px;
            font-family: var(--font-display);
            font-size: 1rem;
        }

        .btn-checkout:hover {
            background: transparent;
            color: var(--accent-color);
        }

        .empty-state {
            text-align: left;
            padding: var(--spacing-xl) 0;
        }

        .empty-state p {
            font-size: 1.25rem;
            color: var(--ink-gray);
            margin-bottom: var(--spacing-md);
        }

        @media (max-width: 768px) {
            .cart-item {
                grid-template-columns: 100px 1fr;
            }
            .cart-item-price-col {
                grid-column: 1 / -1;
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                margin-top: var(--spacing-sm);
            }
            .summary-row, .btn-checkout {
                width: 100%;
            }
        }
    </style>
</head>

<body class="pdp-container" style="background-color: #ffffff;">

    <div class="studio-layout">
        <!-- Standard Sidebar Navigation -->
        <aside class="studio-sidebar">
            <div class="sidebar-top">
                <div class="sidebar-logo-container">
                    <a href="index.html" class="sidebar-logo-link" style="display: block; transition: opacity 0.3s; opacity: 0.8;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.8'">
                        <img src="assets/Logo%20Signature%20fill.svg" alt="AILY Signature" style="width: 100px; filter: invert(49%) sepia(86%) saturate(2971%) hue-rotate(347deg) brightness(98%) contrast(93%);">
                    </a>
                    <a href="cart.html" class="bag-icon-trigger" aria-label="View Bag">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path>
                            <line x1="3" y1="6" x2="21" y2="6"></line>
                            <path d="M16 10a4 4 0 0 1-8 0"></path>
                        </svg>
                        <span class="bag-count-badge">0</span>
                    </a>
                </div>
                <nav class="studio-sidebar-nav">
                    <a href="shop.html" class="sidebar-link">Store</a>
                    <a href="journal.html" class="sidebar-link">Journal</a>
                    <a href="about.html" class="sidebar-link">About</a>
                    <a href="cart.html" class="sidebar-link active">Bag (0)</a>
                </nav>
            </div>
            <div class="sidebar-footer"></div>
        </aside>

        <main class="cart-container">
            <header class="cart-header">
                <h1 class="cart-title">Your Bag</h1>
            </header>

            <div id="cart-content">
                <!-- Rendered via JS -->
            </div>
        </main>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const cartContent = document.getElementById('cart-content');

            function renderCart() {
                const cartState = JSON.parse(localStorage.getItem('aily_cart_items')) || [];

                if (cartState.length === 0) {
                    cartContent.innerHTML = `
                        <div class="empty-state">
                            <p>Your bag is currently empty.</p>
                            <a href="shop.html" class="pdp-badge-open" style="margin-left: 0; text-decoration: none;">Return to Store</a>
                        </div>
                    `;
                    return;
                }

                let itemsHtml = '<div class="cart-items">';
                let subtotal = 0;

                cartState.forEach((item, index) => {
                    const price = item.price || 0;
                    const itemTotal = price * item.quantity;
                    subtotal += itemTotal;

                    itemsHtml += `
                        <div class="cart-item">
                            <img src="${item.image || 'assets/placeholder-journal.png'}" alt="${item.title}" class="cart-item-image">
                            <div class="cart-item-details">
                                <h3 class="cart-item-title">${item.title}</h3>
                                <span class="cart-item-variant">${item.variant}</span>
                                <button class="remove-btn" data-index="${index}">Remove</button>
                            </div>
                            <div class="cart-item-price-col">
                                <div class="qty-controls">
                                    <button class="qty-btn minus" data-index="${index}">−</button>
                                    <span class="qty-display">${item.quantity}</span>
                                    <button class="qty-btn plus" data-index="${index}">+</button>
                                </div>
                                <div class="item-total">£${itemTotal.toFixed(2)}</div>
                            </div>
                        </div>
                    `;
                });

                itemsHtml += '</div>';

                const summaryHtml = `
                    <div class="cart-summary">
                        <div class="summary-row">
                            <span>Subtotal</span>
                            <span>£${subtotal.toFixed(2)}</span>
                        </div>
                        <div class="summary-row">
                            <span>Shipping</span>
                            <span>Calculated at checkout</span>
                        </div>
                        <div class="summary-total">£${subtotal.toFixed(2)}</div>
                        <button class="btn-checkout" onclick="alert('Checkout simulator\\n\\nTotal: £${subtotal.toFixed(2)}\\nThis is a demo store.')">Proceed to Checkout</button>
                    </div>
                `;

                cartContent.innerHTML = itemsHtml + summaryHtml;

                // Bind events
                document.querySelectorAll('.qty-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const idx = e.currentTarget.getAttribute('data-index');
                        const isPlus = e.currentTarget.classList.contains('plus');
                        if (isPlus) {
                            cartState[idx].quantity++;
                        } else {
                            if (cartState[idx].quantity > 1) {
                                cartState[idx].quantity--;
                            }
                        }
                        localStorage.setItem('aily_cart_items', JSON.stringify(cartState));
                        window.cartState = cartState;
                        renderCart();
                        if (typeof window.updateCartDisplay === 'function') window.updateCartDisplay();
                    });
                });

                document.querySelectorAll('.remove-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const idx = e.target.getAttribute('data-index');
                        cartState.splice(idx, 1);
                        localStorage.setItem('aily_cart_items', JSON.stringify(cartState));
                        window.cartState = cartState;
                        renderCart();
                        if (typeof window.updateCartDisplay === 'function') window.updateCartDisplay();
                    });
                });
            }

            renderCart();
        });
    </script>
</body>

</html>
