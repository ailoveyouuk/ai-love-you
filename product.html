<!-- 
  AI LOVE YOU — MASTER PRODUCT TEMPLATE 
  Standardized: April 2026
  
  ARCHITECTURE:
  - This file is a data-driven rendering engine.
  - It consumes product metadata from 'products.js' via the 'id' URL parameter.
  - Styles are governed globally by 'index.css' for architectural consistency.
  
  VERTICAL RHYTHM STANDARDS:
  - 100px top-buffer for fixed-nav clearance.
  - 20px buffer below intro text for the navigation pill.
  - Standardized 150px gap from interaction cues to the image grid.
-->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Love You — The Studio Store</title>
    <link href="index.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="products.js"></script>
    <script src="assets/journals/journalData.js"></script>
    <script src="script.js"></script>
</head>

<body>

    <div class="studio-layout">
        <!-- New Standard Sidebar Navigation -->
        <aside class="studio-sidebar">
            <div class="sidebar-top">
                <div class="sidebar-logo-container">
                    <a href="index.html" class="sidebar-logo-link" style="display: block; transition: opacity 0.3s; opacity: 0.8;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.8'">
                        <img src="assets/Logo%20Signature%20fill.svg" alt="AILY Signature" style="width: 100px; filter: invert(49%) sepia(86%) saturate(2971%) hue-rotate(347deg) brightness(98%) contrast(93%);">
                    </a>
                    <a href="cart.html" class="bag-icon-trigger" aria-label="View Bag">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path>
                            <line x1="3" y1="6" x2="21" y2="6"></line>
                            <path d="M16 10a4 4 0 0 1-8 0"></path>
                        </svg>
                        <span class="bag-count-badge">0</span>
                    </a>
                </div>
                <nav class="studio-sidebar-nav">
                    <a href="shop.html" class="sidebar-link active">Store</a>
                    <a href="journal.html" class="sidebar-link">Journal</a>
                    <a href="about.html" class="sidebar-link">About</a>
                </nav>
                <div id="pdp-sidebar-commerce" style="margin-top: 4rem; padding-top: 2rem; border-top: 1px solid var(--border-color);"></div>
            </div>
            <div class="sidebar-footer"></div>
        </aside>



        <!-- Mobile Navigation Fixed Top Bar -->
    <nav class="studio-nav">
        <a href="index.html" class="nav-brand-mobile">
            <img src="assets/Logo%20Signature%20fill.svg" alt="AILY Logo">
        </a>
        <div class="nav-actions-mobile">
            <a href="cart.html" class="bag-icon-trigger" aria-label="View Bag" style="color: var(--text-color); position: relative;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <path d="M16 10a4 4 0 0 1-8 0"></path>
                </svg>
                <span class="bag-count-badge">0</span>
            </a>
            <button class="menu-toggle" aria-label="Toggle Menu">
                <span></span>
                <span></span>
            </button>
        </div>
        
        <!-- Full Screen Mobile Overlay -->
        <div class="nav-links">
            <a href="shop.html">Store</a>
            <a href="journal.html">Journal</a>
            <a href="about.html">About</a>
        </div>
    </nav>

<main class="pdp-container studio-main" id="pdp-target" style="background-color: #ffffff;">
        <!-- Rendered via JS -->
    </main>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');
            const target = document.getElementById('pdp-target');

            if (!productId || typeof products === 'undefined') {
                target.innerHTML = '<h2>Edition not found.</h2><a href="shop.html" style="color:var(--accent-color);">Return to Store</a>';
                return;
            }

            const product = products.find(p => p.id === productId);

            if (!product) {
                target.innerHTML = '<h2>Edition not found.</h2><a href="shop.html" style="color:var(--accent-color);">Return to Store</a>';
                return;
            }

            // State for variants
            let activeDesignVariantIndex = 0;
            let currentDesignVariant = product.designVariants ? product.designVariants[activeDesignVariantIndex] : null;
            let images = currentDesignVariant ? currentDesignVariant.images : (product.images && product.images.length > 0 ? product.images : [product.image]);

            // ---- Helper Functions ----

            
            function renderPurchaseBlock(prod, activeIndex, suffix) {
                const priceVariants = prod.priceVariants || { "A3+": 45 };
                const firstPrice = Object.values(priceVariants)[0];
                return `
                    <style>
                        .pdp-format-dropdown {
                            font-family: var(--font-display);
                            font-size: 0.8rem;
                            letter-spacing: 0.1em;
                            text-transform: uppercase;
                            color: var(--carbon-black);
                            background: transparent;
                            border: 1px solid var(--border-color);
                            padding: 0.5rem 1rem;
                            width: 100%;
                            cursor: pointer;
                            outline: none;
                        }
                        .pdp-commerce-label {
                            display: block; 
                            margin-bottom: 1rem; 
                            font-family: var(--font-display); 
                            font-size: 0.8rem; 
                            letter-spacing: 0.1em; 
                            text-transform: uppercase; 
                            color: var(--carbon-black); 
                            font-weight: 700;
                        }
                        .btn-bag-pill {
                            font-family: var(--font-body);
                            font-size: 0.65rem;
                            font-weight: 700;
                            text-transform: uppercase;
                            letter-spacing: 0.1em;
                            background: var(--accent-color);
                            color: #ffffff;
                            border: 1.5px solid var(--accent-color);
                            padding: 0.5rem 0.6rem;
                            border-radius: 12px;
                            cursor: pointer;
                            transition: all 0.3s ease;
                            text-align: center;
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            width: 100%;
                            margin-top: 2rem;
                        }
                        .btn-bag-pill:hover {
                            background: transparent;
                            color: var(--accent-color);
                        }
                    </style>
                    <div class="pdp-purchase-block" id="purchase-block-${suffix}">
                        ${prod.designVariants ? `
                            <div class="pdp-purchase-row" style="margin-bottom: 2rem;">
                                <span class="pdp-commerce-label">Edition</span>
                                <div class="pdp-variants design-selector" style="display: flex; flex-direction: column; gap: 0.8rem;">
                                    ${prod.designVariants.map((dv, i) => 
                                        `<button class="nav-link ${i === activeIndex ? 'active' : ''} variant-pill-subtle" data-design-index="${i}" style="text-align: left; padding: 0; background: transparent; border: none; cursor: pointer; opacity: 1;">${dv.name}</button>`
                                    ).join('')}
                                </div>
                            </div>
                        ` : ''}

                        <div class="pdp-purchase-row" style="margin-bottom: 2rem;">
                            <span class="pdp-commerce-label">Format</span>
                            <div class="pdp-variants size-selector">
                                <select class="pdp-format-dropdown">
                                    ${Object.keys(priceVariants).map((key, i) => 
                                        `<option value="${key}" data-price="${priceVariants[key]}">${key}</option>`
                                    ).join('')}
                                </select>
                            </div>
                        </div>

                        <div class="pdp-purchase-row" style="margin-bottom: 2rem;">
                            <span class="pdp-commerce-label">Quantity</span>
                            <div class="pdp-qty-selector" style="justify-content: flex-start; display: flex; align-items: center;">
                                <button class="pdp-qty-btn minus" aria-label="Decrease quantity" style="font-size: 0.9rem; width: 1.5rem; height: 1.5rem; display: flex; align-items: center; justify-content: center; padding: 0;">−</button>
                                <span class="pdp-qty-display" style="font-family: var(--font-display); font-size: 0.8rem; letter-spacing: 0.05em; min-width: 2rem; text-align: center;">1</span>
                                <button class="pdp-qty-btn plus" aria-label="Increase quantity" style="font-size: 0.9rem; width: 1.5rem; height: 1.5rem; display: flex; align-items: center; justify-content: center; padding: 0;">+</button>
                            </div>
                        </div>

                        <div class="pdp-purchase-row">
                            <div class="pdp-price price-display" style="font-size: 3rem; font-weight: 800; margin: 0; color: var(--carbon-black); letter-spacing: -0.02em; font-family: var(--font-body);">£${firstPrice}</div>
                        </div>

                        <button class="btn-bag-pill pdp-add-btn" data-id="${prod.id}">Add to Bag</button>
                    </div>
                `;
            }
            const renderShowcaseGrid = () => {
                const gridContainer = document.getElementById('variant-showcase-container');
                if (!gridContainer) return;
                
                // Map to the sequence (Artwork | Wall Mounted | Size Comparison)
                const slots = [
                    { img: images[0] || product.image, label: 'Base Artwork' },
                    { img: images[1] || images[0] || product.image, label: 'Wall Mounted' },
                    { img: images[2] || images[0] || product.image, label: 'Size Comparison' }
                ];

                // Row 1: The Images
                const imagesHtml = slots.map((slot, i) => `
                    <div class="pdp-variant-frame">
                        <div class="pdp-variant-img-box" style="padding: 0; background: transparent; border: none; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; width: 100%;">
                            <img src="${slot.img}" alt="${slot.label}" 
                                 style="width: 100%; height: 100%; object-fit: contain; padding: 2rem; background: #ffffff;">
                        </div>
                    </div>
                `).join('');

                // Update container row layout based on content
                gridContainer.style.gridTemplateRows = '1fr';
                gridContainer.innerHTML = imagesHtml;
            };

            window.selectVariantGlobal = (index) => {
                const designSelectors = document.querySelectorAll('.design-selector .variant-pill-subtle');
                const firstSelectorMatch = Array.from(designSelectors).find(btn => parseInt(btn.getAttribute('data-design-index')) === index);
                if (firstSelectorMatch) firstSelectorMatch.click();
            };

            const attachEventListeners = () => {
                const allPriceDisplays = document.querySelectorAll('.price-display');
                
                // Sync Size Selectors (Dropdown)
                const formatSelects = document.querySelectorAll('.pdp-format-dropdown');
                formatSelects.forEach(selectBox => {
                    selectBox.addEventListener('change', (e) => {
                        const selectedOption = e.target.options[e.target.selectedIndex];
                        const selectedPrice = selectedOption.getAttribute('data-price');
                        
                        // Sync any other copies of this dropdown globally
                        formatSelects.forEach(s => s.value = e.target.value);
                        
                        updatePriceDisplays(selectedPrice);
                    });
                });

                // Quantity Logic
                let selectedQuantity = 1;
                const updatePriceDisplays = (unitPrice) => {
                    const total = (parseFloat(unitPrice) * selectedQuantity);
                    allPriceDisplays.forEach(pd => pd.innerText = '£' + total);
                };

                document.querySelectorAll('.pdp-qty-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const isPlus = btn.classList.contains('plus');
                        if (isPlus) {
                            selectedQuantity++;
                        } else {
                            if (selectedQuantity > 1) selectedQuantity--;
                        }
                         
                        document.querySelectorAll('.pdp-qty-display').forEach(d => d.innerText = selectedQuantity);
                         
                        const formatDropdown = document.querySelector('.pdp-format-dropdown');
                        const unitPrice = formatDropdown ? formatDropdown.options[formatDropdown.selectedIndex].getAttribute('data-price') : (Object.values(product.priceVariants || { "A3+": 45 })[0]);
                        updatePriceDisplays(unitPrice);
                    });
                });

                // Sync Design Selectors
                const designSelectors = document.querySelectorAll('.design-selector');
                designSelectors.forEach(container => {
                    const btns = container.querySelectorAll('.variant-pill-subtle');
                    btns.forEach(btn => {
                        btn.addEventListener('click', () => {
                            const idx = parseInt(btn.getAttribute('data-design-index'));
                            if (idx === activeDesignVariantIndex) return;

                            activeDesignVariantIndex = idx;
                            currentDesignVariant = product.designVariants[idx];
                            images = currentDesignVariant.images;
                            
                            document.querySelectorAll('.design-selector .variant-pill-subtle').forEach(b => {
                                if (parseInt(b.getAttribute('data-design-index')) === idx) b.classList.add('active');
                                else b.classList.remove('active');
                            });

                            const gridContainer = document.getElementById('variant-showcase-container');
                            if (gridContainer) {
                                gsap.to(gridContainer, {
                                    opacity: 0,
                                    duration: 0.3,
                                    onComplete: () => {
                                        renderShowcaseGrid();
                                        gsap.to(gridContainer, { opacity: 1, duration: 0.4 });
                                    }
                                });
                            }
                        });
                    });
                });

                // Add to Bag (All Buttons)
                document.querySelectorAll('.pdp-add-btn').forEach(addBtn => {
                    addBtn.addEventListener('click', () => {
                        const activeSizeBtn = document.querySelector('.size-selector .variant-pill-subtle.active');
                        const activeDesignBtn = document.querySelector('.design-selector .variant-pill-subtle.active');
                        
                        const sizeVariant = activeSizeBtn ? activeSizeBtn.innerText : 'Default';
                        const designVariantName = activeDesignBtn ? activeDesignBtn.innerText : '';
                        const variantString = designVariantName ? `${designVariantName} Edition - ${sizeVariant}` : sizeVariant;
                        
                        const price = activeSizeBtn ? activeSizeBtn.getAttribute('data-price') : (Object.values(product.priceVariants)[0]);
                        const coverImg = images[0];

                        if (typeof window.addToArchiveFeedback === 'function') {
                            window.addToArchiveFeedback(addBtn, {
                                id: product.id,
                                title: product.title,
                                variant: variantString,
                                price: parseFloat(price),
                                image: coverImg,
                                quantity: selectedQuantity
                            });
                        }
                    });
                });
                
                const scrollBtn = document.getElementById('scroll-to-gallery');
                if (scrollBtn) {
                    scrollBtn.addEventListener('click', () => {
                        const gallery = document.getElementById('variant-showcase-container');
                        if (gallery) gallery.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    });
                }
            };

            const renderSimilarProducts = (currentProd) => {
                const similarGrid = document.getElementById('similar-grid');
                if (!similarGrid) return;

                const scoredProducts = products
                    .filter(p => p.id !== currentProd.id)
                    .map(p => {
                        let score = 0;
                        if (p.series === currentProd.series) score += 10;
                        if (p.category === currentProd.category) score += 5;
                        if (p.tags && currentProd.tags) {
                            const shared = p.tags.filter(t => currentProd.tags.includes(t));
                            score += shared.length;
                        }
                        return { ...p, score };
                    })
                    .sort((a, b) => b.score - a.score)
                    .slice(0, 4);

                similarGrid.innerHTML = scoredProducts.map(p => `
                    <article class="pdp-related-card" onclick="window.location.href='product.html?id=${p.id}'">
                        <div class="pdp-related-image-container">
                            <img src="${p.images ? p.images[0] : p.image}" alt="${p.title}" class="pdp-related-image" loading="lazy">
                        </div>
                        <div class="card-content-wrapper">
                            <div class="card-pill-orange">${p.category}</div>
                            <div class="card-title">${p.title}</div>
                            <div class="card-footer" style="padding-top: 0.5rem; margin-top: auto;">
                                <span class="card-price">£${Object.values(p.priceVariants || {"Base": "TBD"})[0]}</span>
                                <span class="card-link">Discover &rarr;</span>
                            </div>
                        </div>
                    </article>
                `).join('');
            };

            const renderUI = () => {
                const headerHtml = `
                    <header class="sticky-breadcrumb-header">
                        <nav class="pdp-breadcrumbs" style="display: flex; gap: 0.5rem; color: var(--ink-gray); font-family: var(--font-display); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 700;">
                            <a href="shop.html" style="color: inherit; text-decoration: none; transition: opacity 0.2s;" onmouseover="this.style.opacity='0.6'" onmouseout="this.style.opacity='1'">STORE</a> <span style="opacity: 0.5;">//</span> 
                            <a href="shop.html?category=${product.category}" style="color: inherit; text-decoration: none; transition: opacity 0.2s;" onmouseover="this.style.opacity='0.6'" onmouseout="this.style.opacity='1'">${product.category}</a> <span style="opacity: 0.5;">//</span>
                            <span style="color: var(--text-color); opacity: 0.8;">${product.title}</span>
                        </nav>
                    </header>
                    <section class="pdp-split-header">
                        <div class="pdp-header-left">
                            <h1 class="pdp-akaru-title">${product.title}</h1>
                            <div style="margin-bottom: 0.5rem;">
                                <span class="pdp-akaru-series">${product.series}</span>
                                <span style="font-size: 1.4rem; color: var(--ink-gray); vertical-align: middle; margin: 0 0.5rem;">/</span>
                                <span class="pdp-akaru-series" style="color: var(--text-color); opacity: 0.8; letter-spacing: 0.05em;">BY AI LOVE YOU</span>
                            </div>
                            <div class="pdp-header-intro">
                                ${product.metadata ? product.metadata.introText : product.description}
                            </div>
                            
                            <div class="pdp-scroll-cta">
                                <div class="scroll-pill-nav" id="scroll-to-gallery">
                                    PRODUCT DETAILS
                                </div>
                            </div>

                            <!-- Mobile/Tablet Commerce Injection Target -->
                            <div id="pdp-mobile-commerce" class="pdp-mobile-commerce"></div>
                        </div>
                    </section>
                `;

                // Inject dynamic purchase block into both targets
                const sidebarContainer = document.getElementById('pdp-sidebar-commerce');
                const mobileContainer = document.getElementById('pdp-mobile-commerce');
                
                const purchaseHtml = renderPurchaseBlock(product, activeDesignVariantIndex, 'main');

                if (sidebarContainer) sidebarContainer.innerHTML = purchaseHtml;
                
                // On mobile we wait for the header HTML to be injected below
                // so we handle the mobile container after target.innerHTML is set.

                const showcaseHtml = `
                    <section class="pdp-variant-showcase" id="variant-showcase-container">
                        <!-- Grid items rendered by renderShowcaseGrid -->
                    </section>
                `;

                const mainContentHtml = `
                    <section class="pdp-main-grid">
                        <div class="pdp-content-left">
                            <div class="pdp-section-subhead">CONCEPT & SERIES THEME</div>
                            <div class="pdp-section-body" style="line-height: 1.5; margin-bottom: var(--spacing-md);">
                                ${product.metadata ? product.metadata.conceptDesc : product.description}
                            </div>

                            <div class="pdp-section-subhead">WHY YOU WILL LOVE IT</div>
                            <div class="pdp-section-body" style="margin-bottom: var(--spacing-md);">
                                ${product.metadata ? product.metadata.whyLoveIt : ''}
                            </div>
                            
                            <div class="pdp-section-subhead" style="margin-top: var(--spacing-lg);">PRODUCT DETAILS & SHIPPING</div>
                            <div class="pdp-nested-metadata-grid">
                                <div class="pdp-details-card-nested">
                                    <h4>Available Sizes (${product.orientation || 'Landscape'})</h4>
                                    <p>${product.metadata ? product.metadata.specs.sizes : 'Standard sizes available'}</p>
                                    <h4 style="margin-top: var(--spacing-md);">Paper</h4>
                                    <p>${product.metadata ? product.metadata.specs.paper : 'Premium paper stock'}</p>
                                </div>
                                <div class="pdp-details-card-nested">
                                    <h4>Ink & Longevity</h4>
                                    <p>Printed using pigment & dye-based Epson Claria inks.</p>
                                    <p style="margin-top: var(--spacing-sm);">Display life ≈ ${product.metadata ? product.metadata.specs.longevityDisplay : '150–180 years'} behind UV-glass</p>
                                    <p>${product.metadata ? product.metadata.specs.longevityArchival : 'Over 200 years'} in archival storage</p>
                                    <p style="font-size: 0.65rem; opacity: 0.6; margin-top: var(--spacing-sm); line-height: 1.4;">${product.metadata ? product.metadata.specs.longevitySource : ''}</p>
                                </div>
                                <div class="pdp-details-card-nested" style="border-right: none;">
                                    <h4>Packaging</h4>
                                    <p>${product.metadata ? product.metadata.specs.packaging : 'Shipped in protective packaging.'}</p>
                                    <h4 style="margin-top: var(--spacing-md);">Shipping</h4>
                                    <p>${product.metadata ? product.metadata.specs.shipping : 'Calculated at checkout.'}</p>
                                </div>
                            </div>
                        </div>

                    </section>

                    <section class="pdp-akaru-similar" style="width: 100%; margin: 0 auto; padding: calc(var(--spacing-xxl) / 2) 0; border-bottom: 1px solid rgba(0,0,0,0.05); background: #ffffff;">
                        <h3 class="pdp-related-title" style="font-family: var(--font-display); font-size: 0.85rem; color: var(--ink-gray); text-transform: uppercase; letter-spacing: 0.15em; font-weight: 700; margin-bottom: 1.5rem; padding-left: 20px;">WE ALSO THINK YOU WILL LOVE</h3>
                        <div class="similar-grid-mini" id="similar-grid" style="padding: 0 20px;"></div>
                    </section>

                    <section id="pdp-archive-sync" class="pdp-akaru-similar" style="width: 100%; margin: 0 auto; padding: calc(var(--spacing-xxl) / 2) 0; border-bottom: 1px solid rgba(0,0,0,0.05); display: none; background: #ffffff;">
                        <h3 class="pdp-related-title" style="font-family: var(--font-display); font-size: 0.85rem; color: var(--ink-gray); text-transform: uppercase; letter-spacing: 0.15em; font-weight: 700; margin-bottom: 1.5rem; padding-left: 20px;">FROM THE JOURNAL</h3>
                        <div class="similar-grid-mini" id="archive-sync-grid" style="padding: 0 20px;"></div>
                    </section>
                `;

                target.innerHTML = headerHtml + showcaseHtml + mainContentHtml;
                
                // Inject into mobile container now that it exists in DOM
                const mobileContainer = document.getElementById('pdp-mobile-commerce');
                if (mobileContainer) {
                    mobileContainer.innerHTML = purchaseHtml;
                }

                renderShowcaseGrid();
                attachEventListeners();
                renderSimilarProducts(product);
                renderArchiveSync(product);
                

            };

            const renderArchiveSync = (product) => {
                const container = document.getElementById('pdp-archive-sync');
                const grid = document.getElementById('archive-sync-grid');
                if (!container || !grid || !product.archiveTags) return;

                // Find matching journal entries using journalData.js (global object)
                if (typeof journalData === 'undefined') return;

                const matches = journalData.filter(entry => 
                    entry.category !== 'global-five' && 
                    entry.keywords.some(tag => product.archiveTags.includes(tag))
                ).sort(() => 0.5 - Math.random()).slice(0, 4);

                if (matches.length > 0) {
                    container.style.display = 'block';
                    grid.innerHTML = matches.map(entry => `
                        <article class="pdp-related-card is-archive" onclick="window.location.href='${entry.link}'">
                            <div class="pdp-related-image-container">
                                <img src="${entry.image}" alt="${entry.title}" class="pdp-related-image" loading="lazy" style="transition: filter 0.6s ease;">
                            </div>
                            <div class="card-content-wrapper">
                                <div class="card-pill-orange">${entry.edition || 'JOURNAL'}</div>
                                <div class="card-title">${entry.title}</div>
                                <div class="card-footer" style="padding-top: 0.5rem; margin-top: auto;">
                                    <span class="card-price" style="color: var(--ink-gray); font-size: 0.75rem;">${entry.category || 'Archive'}</span>
                                    <span class="card-link">Read &rarr;</span>
                                </div>
                            </div>
                        </article>
                    `).join('');

                    // Add hover effect fix to grayscale
                    grid.querySelectorAll('.pdp-related-card').forEach(card => {
                        const img = card.querySelector('img');
                        card.addEventListener('mouseover', () => {
                            img.style.filter = 'grayscale(0)';
                        });
                        card.addEventListener('mouseout', () => {
                            img.style.filter = 'grayscale(1)';
                        });
                    });
                }
            };

            renderUI();
        });
    </script>
